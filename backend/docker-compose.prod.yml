# VexoCrm/backend/docker-compose.prod.yml
# Production deployment with Caddy reverse proxy and HTTPS.
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  api:
    build: .
    container_name: vexo-api
    restart: unless-stopped
    env_file: .env
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: vexo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
