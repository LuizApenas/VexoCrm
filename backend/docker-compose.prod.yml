# VexoCrm/backend/docker-compose.prod.yml
# Production deployment for EasyPanel or manual VPS.
# EasyPanel handles HTTPS/SSL automatically.
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  api:
    build: .
    container_name: vexo-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
